map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name app.kijko.nl;
    root /usr/share/nginx/html;
    index index.html;

    # --- Sandra API: IDE sessions (WebSocket + HTTP proxy) ---
    location ~ ^/api/v1/ide/sessions/[^/]+/ws/ {
        proxy_pass http://host.docker.internal:8200;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_buffering off;
    }

    location ~ ^/api/v1/ide/ {
        proxy_pass http://host.docker.internal:8200;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    # --- Sandra API: SSE event streams (long-lived connections) ---
    location ~ ^/api/v1/scrubber/[^/]+/stream$ {
        proxy_pass http://host.docker.internal:8200;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    location ~ ^/api/v1/stream/ {
        proxy_pass http://host.docker.internal:8200;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # --- Sandra API: sessions, chronos, scrubber, kijko, keymaker ---
    location ~ ^/api/v1/(sessions|chronos|scrubber|kijko|keymaker|lifecycle|status|audit|checkpoints|presets) {
        proxy_pass http://host.docker.internal:8200;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 120s;
    }

    # --- HyperVisa API ---
    location /api/hypervisa/ {
        proxy_pass http://host.docker.internal:8042;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    # --- Kijko backend API (catch-all for /api/v1) ---
    location /api/v1/ {
        proxy_pass http://host.docker.internal:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- SPA catch-all ---
    location / {
        try_files $uri $uri/ /index.html;
    }

    add_header Content-Security-Policy "frame-ancestors 'self' https://swarm.kijko.nl" always;
    add_header X-Content-Type-Options "nosniff" always;
}
